<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zartour</title>

<meta name="description" content="Explore culture, earn badges, and discover heritage with Zartour.">
<meta name="theme-color" content="#0f172a">

<!-- Open Graph -->
<meta property="og:title" content="Zartour">
<meta property="og:description" content="Explore culture. Earn status. Move through heritage.">
<meta property="og:type" content="website">

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>
  <div class="logo">Zartour</div>

  <nav class="tabs">
    <span class="active">Feed</span>
    <span onclick="location.href='passport.html'">Passport</span>
    <span onclick="location.href='leaderboard.html'">Leaderboard</span>
  </nav>
</header>

<main>

  <!-- Loading State -->
  <div id="loading" class="loading">Loading experiences...</div>

  <!-- Feed -->
  <div class="feed" id="activityFeed"></div>

  <!-- Empty State -->
  <div id="emptyState" class="empty hidden">
    No activity yet. Be the first to explore.
  </div>

</main>

<!-- Floating Action Button -->
<button class="fab" title="Add Experience">+</button>

<footer>
  <button onclick="location.href='index.html'">Feed</button>
  <button onclick="location.href='story.html'">Explore</button>
  <button onclick="location.href='passport.html'">Passport</button>
  <button onclick="location.href='leaderboard.html'">Leaderboard</button>
</footer>

<script src="app.js"></script>

<script>
function renderFeedItem(user, text, time, avatar) {
  return `
    <div class="feed-card">
      <img class="avatar" src="${avatar}" alt="${user}">
      <div class="feed-content">
        <div class="feed-user">${user}</div>
        <div class="feed-text">${text}</div>
        <div class="feed-time">${time}</div>
      </div>
    </div>
  `;
}

function loadFeed() {
  const feed = document.getElementById("activityFeed");
  const loading = document.getElementById("loading");
  const empty = document.getElementById("emptyState");

  loading.style.display = "none";

  const data = [
    {
      user: "Ayana Thobejane",
      text: "earned the <b>Heritage Explorer Badge</b> at Bakone Village",
      time: "2 minutes ago",
      avatar: "https://i.pravatar.cc/40"
    },
    {
      user: "Ophethile Sefala",
      text: "checked in at <b>Sacred Tree</b>",
      time: "10 minutes ago",
      avatar: "https://i.pravatar.cc/41"
    }
  ];

  if (data.length === 0) {
    empty.classList.remove("hidden");
    return;
  }

  feed.innerHTML = data.map(item =>
    renderFeedItem(item.user, item.text, item.time, item.avatar)
  ).join("");
}

loadFeed();
</script>

</body>
  </html>
