<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h2>Cultural Quest Map</h2>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([-23.65,29.72],13);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

L.marker([-23.65,29.72])
.addTo(map)
.bindPopup("<b>Sacred Tree</b><br><a href='quest.html?quest=tree'>Start Quest</a>");

L.marker([-23.66,29.71])
.addTo(map)
.bindPopup("<b>Bakone Story</b><br><a href='quest.html?quest=bakone'>Start Quest</a>");

</script>

</body>
</html>
