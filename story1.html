<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Explore - Zartour</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <div class="logo">Explore</div>
</header>

<main class="explore">

  <!-- Featured Location -->
  <div class="explore-card">
    <h3>🔥 Trending Now</h3>
    <p><b>Bakone Malapa Cultural Site</b></p>
    <p>+50 XP • 12 people checked in today</p>
    <button onclick="checkIn('Bakone Malapa')">Go There</button>
  </div>

  <!-- Nearby -->
  <div class="explore-card">
    <h3>📍 Near You</h3>
    <p><b>Sacred Tree</b></p>
    <p>+20 XP • Quiet spot</p>
    <button onclick="checkIn('Sacred Tree')">Check In</button>
  </div>

  <!-- Challenge -->
  <div class="explore-card">
    <h3>🏆 Challenge</h3>
    <p>Complete 3 Bakone locations</p>
    <p>Reward: Heritage Explorer Badge</p>
    <button>Start Challenge</button>
  </div>

</main>

<script>
function checkIn(place) {
  alert("Checked in at " + place);
}
</script>

</body>
</html>
